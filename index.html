<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Calendar</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { color: #1a1a1a; margin-bottom: 8px; }
        .subtitle { color: #666; margin-bottom: 20px; }
        .filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .filters select, .filters input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .filters input { flex: 1; min-width: 200px; }
        .race-count { color: #666; margin-bottom: 15px; font-size: 14px; }

        .month-banner { background: #2c3e50; color: white; padding: 10px 18px; border-radius: 8px 8px 0 0; margin-top: 28px; font-size: 16px; font-weight: 600; letter-spacing: 0.5px; }
        .month-banner:first-of-type { margin-top: 0; }

        .race-card { background: white; border: 1px solid #e0e0e0; border-radius: 0; padding: 18px; border-bottom: none; }
        .race-card:last-child { border-bottom: 1px solid #e0e0e0; border-radius: 0 0 8px 8px; }
        .race-card:hover { background: #fafcff; }

        .race-tier1 { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .race-name { font-size: 20px; font-weight: 700; color: #2c3e50; }
        .race-name a { color: #2c3e50; text-decoration: none; }
        .race-name a:hover { color: #3498db; }
        .category-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .category-badge.ultra { background: #e8f5e9; color: #2e7d32; }
        .category-badge.marathon { background: #e3f2fd; color: #1565c0; }
        .category-badge.other { background: #f3e5f5; color: #7b1fa2; }

        .race-tier2 { display: flex; gap: 24px; margin-bottom: 10px; flex-wrap: wrap; }
        .race-tier2 .date-item { font-size: 15px; color: #333; font-weight: 500; }
        .race-tier2 .date-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; color: #888; font-weight: 600; }
        .race-tier2 .date-value { margin-top: 1px; }
        .reg-type { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .reg-type.lottery { background: #fff3e0; color: #e65100; }
        .reg-type.direct { background: #e8f5e9; color: #2e7d32; }

        .race-tier3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 6px; font-size: 13px; color: #666; }
        .race-tier3 .detail { display: flex; flex-direction: column; }
        .race-tier3 .label { font-weight: 600; color: #555; font-size: 11px; text-transform: uppercase; letter-spacing: 0.3px; }
        .race-tier3 .value { margin-top: 1px; }

        .race-notes { margin-top: 8px; font-size: 12px; color: #888; font-style: italic; border-top: 1px solid #f0f0f0; padding-top: 6px; }
        .no-results { text-align: center; color: #999; padding: 40px; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Race Calendar</h1>
        <p class="subtitle">All tracked races from races.json</p>

        <div class="filters">
            <select id="category-filter">
                <option value="all">All Categories</option>
                <option value="ultra">Ultras</option>
                <option value="marathon">Marathons</option>
                <option value="other">Other</option>
            </select>
            <select id="sort-by">
                <option value="race_date">Sort by Race Date</option>
                <option value="registration_date">Sort by Registration Date</option>
                <option value="name">Sort by Name</option>
            </select>
            <input type="text" id="search" placeholder="Search races...">
        </div>

        <div class="race-count" id="race-count"></div>
        <div id="races-container"></div>
    </div>

    <script>
        let allRaces = [];

        const MONTH_NAMES = ['January', 'February', 'March', 'April', 'May', 'June',
                             'July', 'August', 'September', 'October', 'November', 'December'];

        function monthDayToDate(mmdd) {
            if (!mmdd) return null;
            const [month, day] = mmdd.split('-').map(Number);
            const today = new Date();
            let d = new Date(today.getFullYear(), month - 1, day);
            if (d < today) {
                d = new Date(today.getFullYear() + 1, month - 1, day);
            }
            return d;
        }

        function getMonthFromMMDD(mmdd) {
            if (!mmdd) return null;
            const [month] = mmdd.split('-').map(Number);
            return month - 1;
        }

        function formatDate(mmdd) {
            if (!mmdd) return 'TBD';
            const d = monthDayToDate(mmdd);
            return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
        }

        function formatElevation(race) {
            const elev = race.elevation_gain_ft;
            if (!elev) return race.elevation_notes || 'N/A';
            if (typeof elev === 'object') {
                return Object.entries(elev).map(([dist, gain]) => `${dist}: ${gain.toLocaleString()} ft`).join(', ');
            }
            return `${elev.toLocaleString()} ft`;
        }

        function renderRaceCard(race) {
            return `
                <div class="race-card">
                    <div class="race-tier1">
                        <div class="race-name"><a href="${race.website}" target="_blank">${race.name}</a></div>
                        <span class="category-badge ${race.category}">${race.category}</span>
                    </div>
                    <div class="race-tier2">
                        <div class="date-item">
                            <div class="date-label">Race Date</div>
                            <div class="date-value">${formatDate(race.race_date)}${race.race_date_end && race.race_date_end !== race.race_date ? ' - ' + formatDate(race.race_date_end) : ''}</div>
                        </div>
                        <div class="date-item">
                            <div class="date-label">Registration</div>
                            <div class="date-value">${race.registration_date ? formatDate(race.registration_date) : 'TBD'} <span class="reg-type ${race.registration_type}">${race.registration_type}</span></div>
                        </div>
                    </div>
                    <div class="race-tier3">
                        <div class="detail">
                            <span class="label">Location</span>
                            <span class="value">${race.city}, ${race.state_or_country}</span>
                        </div>
                        <div class="detail">
                            <span class="label">Distances</span>
                            <span class="value">${race.distances.join(', ')}</span>
                        </div>
                        <div class="detail">
                            <span class="label">Elevation</span>
                            <span class="value">${formatElevation(race)}</span>
                        </div>
                        <div class="detail">
                            <span class="label">Terrain</span>
                            <span class="value">${race.terrain}</span>
                        </div>
                    </div>
                    ${race.notes ? `<div class="race-notes">${race.notes}</div>` : ''}
                </div>
            `;
        }

        function renderRaces() {
            const category = document.getElementById('category-filter').value;
            const sortBy = document.getElementById('sort-by').value;
            const search = document.getElementById('search').value.toLowerCase();

            let filtered = allRaces.filter(race => {
                if (category !== 'all' && race.category !== category) return false;
                if (search && !race.name.toLowerCase().includes(search) &&
                    !race.city.toLowerCase().includes(search) &&
                    !race.state_or_country.toLowerCase().includes(search)) return false;
                return true;
            });

            filtered.sort((a, b) => {
                if (sortBy === 'name') return a.name.localeCompare(b.name);
                if (sortBy === 'race_date') {
                    const da = monthDayToDate(a.race_date);
                    const db = monthDayToDate(b.race_date);
                    if (!da) return 1;
                    if (!db) return -1;
                    return da - db;
                }
                if (sortBy === 'registration_date') {
                    const da = monthDayToDate(a.registration_date);
                    const db = monthDayToDate(b.registration_date);
                    if (!da) return 1;
                    if (!db) return -1;
                    return da - db;
                }
                return 0;
            });

            document.getElementById('race-count').textContent = `Showing ${filtered.length} of ${allRaces.length} races`;

            const container = document.getElementById('races-container');
            if (filtered.length === 0) {
                container.innerHTML = '<div class="no-results">No races match your filters.</div>';
                return;
            }

            if (sortBy === 'race_date') {
                let html = '';
                let currentMonth = null;
                for (const race of filtered) {
                    const month = getMonthFromMMDD(race.race_date);
                    const monthKey = month !== null ? month : -1;
                    if (monthKey !== currentMonth) {
                        currentMonth = monthKey;
                        const label = month !== null ? MONTH_NAMES[month] : 'Date TBD';
                        html += `<div class="month-banner">${label}</div>`;
                    }
                    html += renderRaceCard(race);
                }
                container.innerHTML = html;
            } else if (sortBy === 'registration_date') {
                let html = '';
                let currentMonth = null;
                for (const race of filtered) {
                    const month = getMonthFromMMDD(race.registration_date);
                    const monthKey = month !== null ? month : -1;
                    if (monthKey !== currentMonth) {
                        currentMonth = monthKey;
                        const label = month !== null ? MONTH_NAMES[month] : 'Registration TBD';
                        html += `<div class="month-banner">${label}</div>`;
                    }
                    html += renderRaceCard(race);
                }
                container.innerHTML = html;
            } else {
                container.innerHTML = filtered.map(race => renderRaceCard(race)).join('');
            }
        }

        document.getElementById('category-filter').addEventListener('change', renderRaces);
        document.getElementById('sort-by').addEventListener('change', renderRaces);
        document.getElementById('search').addEventListener('input', renderRaces);

        fetch('races.json')
            .then(r => r.json())
            .then(data => {
                allRaces = data.races;
                renderRaces();
            })
            .catch(err => {
                document.getElementById('races-container').innerHTML =
                    '<div class="no-results">Error loading races.json. If viewing locally, use a local server: python -m http.server</div>';
            });
    </script>
</body>
</html>
